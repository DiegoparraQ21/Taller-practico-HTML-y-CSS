<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refactorizacion con BEM</title>
    <link rel="stylesheet" href="CSS/styles.css">
</head>

<body>
    <h1>Ejemplo de metodologia BEM</h1>

    <section class="cards">

        <article class="card">
            <h2 class="card__title">Plan basico</h2>

            <p class="card__text">Ideal para usuarios que estan comenzando y necesitan funciones esenciales</p>

            <button class="card__button">Mas informacuon</button>
        </article>

        <article class="card card--featured">
            <h2 class="card__title">Plan premium</h2>

            <p class="card__text">Incluye herramientas avanzadas, soporte prioritario y almacenamiendo ilimitado</p>

            <button class="card__button card__button--primary">Comprar ahora</button>
        </article>

    </section>

</body>

</html>
